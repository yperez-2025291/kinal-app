<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Kinal App</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/colors.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>
  <header class="header">
    <h2 th:text="${titulo}"></h2>
    <p th:text="${mensaje}"></p>
  </header>

  <main class="contenedor-principal">
    <div class="contenedor-entidades">
      <div class="entidad">
        <h3>Usuarios</h3>
        <h3 th:text="${totalUsuarios}"></h3>
        <a class="boton-inspeccionar" th:href="@{/vistas/usuarios}">Inspeccionar</a>
      </div>

      <div class="entidad">
        <h3>Clientes</h3>
        <h3 th:text="${totalClientes}"></h3>
        <a class="boton-inspeccionar" th:href="@{/vistas/clientes}">Inspeccionar</a>
      </div>

      <div class="entidad">
        <h3>Productos</h3>
        <h3 th:text="${totalProductos}"></h3>
        <a class="boton-inspeccionar" th:href="@{/vistas/productos}">Inspeccionar</a>
      </div>
    </div>

    <div class="contenedor-entidades-fk">
      <div class="entidad">
        <h3>Ventas</h3>
        <h3 th:text="${totalVentas}"></h3>  
        <a class="boton-inspeccionar" th:href="@{/vistas/ventas}">Inspeccionar</a>
      
      </div>
      
      <div class="entidad">
        <h3>Detalle de ventas</h3>
        <h3 th:text="${totalDetalles}"></h3>
        <a class="boton-inspeccionar" th:href="@{/vistas/detalles}">Inspeccionar</a>
      </div>
    </div>
  </main>
</body>
</html>
