<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/productos.css}">
    <title th:text="${titulo}"></title>
</head>
<body class="fondo-app">
    <div class="contenedor-principal" style="max-width: 600px;">
        <h1 class="titulo-pagina" th:text="${titulo}"></h1>
        
        <form th:action="@{/vistas/productos/guardar}" th:object="${producto}" method="post">
            <input type="hidden" th:field="*{codigoProducto}">
            <input type="hidden" th:field="*{estado}">

            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Nombre del Producto:</label>
                <input type="text" th:field="*{nombreProducto}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom:5px;">Precio (Q):</label>
                    <input type="number" step="0.01" th:field="*{precio}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom:5px;">Cantidad en Stock:</label>
                    <input type="number" th:field="*{stock}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <button type="submit" class="btn-general btn-primario" style="width: 100%;">Guardar Producto</button>
                <a th:href="@{/vistas/productos}" style="display:block; text-align:center; margin-top:15px; color:var(--roman-coffee-600); text-decoration: none;">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
