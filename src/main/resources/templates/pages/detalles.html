<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/productos.css}">
    <title>Detalles de Venta</title>
</head>
<body class="fondo-app">
    <div class="contenedor-principal">
        <center><h1 class="titulo-pagina">Desglose de Productos Vendidos</h1></center>
        
        <div class="seccion-botones">
            <a th:href="@{/}" class="btn-general btn-volver">← Menú Principal</a>
        </div>

        <table class="tabla-moderna">
            <thead>
                <tr>
                    <th>ID Detalle</th>
                    <th>No. Venta</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unit.</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${detalles}">
                    <td th:text="${d.codigoDetalleVenta}"></td>
                    <td th:text="${d.venta.codigoVenta}" style="font-weight:bold;"></td>
                    <td th:text="${d.producto.nombreProducto}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="'Q ' + ${d.precioUnitario}"></td>
                    <td th:text="'Q ' + ${d.subtotal}" style="color: var(--roman-coffee-700); font-weight: bold;"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
