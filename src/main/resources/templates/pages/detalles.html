<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/detalles.css}">
    <title>Detalles de Venta - Kinal App</title>
</head>
<body>
    <main>
        <div class="contenedor-principal">
        
            <div class="panel-lateral">
                <div class="contenedor-acciones-vertical">
                    <a th:href="@{/vistas/detalles/nuevo}" class="boton-lateral">Nuevo Detalle</a>
                    <a th:href="@{/vistas/detalles}" class="boton-lateral btn-limpiar">Listar Todos</a>
                    <a th:href="@{/}" class="boton-lateral btn-home">Volver al Inicio</a>
                </div>
            </div>

            <div class="contenedor-tabla">
                <div class="contenedor-cabecera">
                    <h2>Detalles de Ventas</h2>

                    <form th:action="@{/vistas/detalles}" method="get" class="barra-busqueda">
                        <input type="number" name="busqueda" placeholder="Buscar por ID Detalle...">
                        <button type="submit" class="btn-buscar">🔍</button>
                    </form>
                </div>

                <table class="tabla-detalles">
                    <thead>
                        <tr>
                            <th>ID Detalle</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Subtotal</th>
                            <th>Producto</th>
                            <th>ID Venta</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${detalles}">
                            <td th:text="${d.codigoDetalleVenta}"></td>
                            <td th:text="${d.cantidad}"></td>
                            <td th:text="${#numbers.formatDecimal(d.precioUnitario, 1, 2)}"></td>
                            <td th:text="${#numbers.formatDecimal(d.subtotal, 1, 2)}"></td>
                            <td th:text="${d.producto.nombreProducto}"></td>
                            <td th:text="${d.venta.codigoVenta}"></td>
                        </tr>
                        <tr th:if="${detalles.isEmpty()}">
                            <td colspan="6" style="text-align: center;">No hay detalles de venta registrados</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
