<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/ventas.css}">
    <title>Gestión de Ventas - Kinal App</title>
</head>
<body>
    <main>
        <div class="contenedor-principal">
        
            <div class="panel-lateral">
                <div class="contenedor-acciones-vertical">
                    <a th:href="@{/vistas/ventas/nuevo}" class="boton-lateral">Nueva Venta</a>
                    <a th:href="@{/vistas/ventas(activos=${!soloActivos})}" 
                        th:text="${soloActivos ? 'Ver Todos' : 'Ver Activos'}" 
                        class="boton-lateral"></a>
                    <a th:href="@{/vistas/ventas}" class="boton-lateral btn-limpiar">Listar Todas</a>
                    <a th:href="@{/}" class="boton-lateral btn-home">Volver al Inicio</a>
                </div>
            </div>

            <div class="contenedor-tabla">
                <div class="contenedor-cabecera">
                    <h2>Gestión de Ventas</h2>

                    <form th:action="@{/vistas/ventas}" method="get" class="barra-busqueda">
                        <input type="number" name="busqueda" placeholder="Buscar por ID...">
                        <button type="submit" class="btn-buscar">🔍</button>
                    </form>
                </div>

                <table class="tabla-ventas">
                    <thead>
                        <tr>
                            <th>ID Venta</th>
                            <th>Fecha</th>
                            <th>Total (Q)</th>
                            <th>Cliente</th>
                            <th>Vendedor</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${ventas}">
                            <td th:text="${v.codigoVenta}">None</td>
                            <td th:text="${#temporals.format(v.fechaVenta, 'dd/MM/yyyy')}">None</td>
                            <td th:text="${#numbers.formatDecimal(v.total, 1, 2)}">None</td>
                            <td th:text="${v.cliente.nombreCliente} + ' ' + ${v.cliente.apellidoCliente}">None</td>
                            <td th:text="${v.usuario.username}">None</td>
                            <td>
                                <span th:class="${v.estado == 1 ? 'estado-activo' : 'estado-inactivo'}"
                                      th:text="${v.estado == 1 ? 'Activo' : 'Inactivo'}">
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${ventas.isEmpty()}">
                            <td colspan="6" style="text-align: center;">No hay ventas registradas</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
