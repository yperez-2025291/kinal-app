<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/formularios-ventas.css}">
    <title th:text="${titulo}"></title>
</head>
<body class="fondo-app">
    <div class="form-container-ventas">
        <h1 class="titulo-pagina" th:text="${titulo}"></h1>
        
        <form th:action="@{/vistas/detalles/guardar}" th:object="${detalleVenta}" method="post">
            
            <div class="campo-formulario">
                <label>No. de Venta (Factura ID):</label>
                <input type="number" th:field="*{venta.codigoVenta}" placeholder="ID de la venta" required>
            </div>

            <div class="campo-formulario">
                <label>Código del Producto:</label>
                <input type="number" th:field="*{producto.codigoProducto}" placeholder="Código de producto" required>
            </div>

            <div class="campo-formulario">
                <label>Cantidad:</label>
                <input type="number" th:field="*{cantidad}" placeholder="0" required>
            </div>

            <div class="campo-formulario">
                <label>Precio Unitario (Q):</label>
                <input type="number" step="0.01" th:field="*{precioUnitario}" placeholder="0.00" required>
            </div>

            <div class="campo-formulario">
                <label>Subtotal (Q):</label>
                <input type="number" step="0.01" th:field="*{subtotal}" placeholder="0.00" required>
            </div>
            
            <div class="seccion-acciones">
                <button type="submit" class="btn-form btn-guardar">Registrar Detalle</button>
                <a th:href="@{/vistas/detalles}" class="btn-form btn-cancelar">← Cancelar y Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
