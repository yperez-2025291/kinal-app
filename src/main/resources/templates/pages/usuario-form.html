<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
    <title th:text="${titulo}"></title>
</head>
<body class="fondo-app">
    <div class="contenedor-principal" style="max-width: 600px;">
        <h1 class="titulo-pagina" th:text="${titulo}"></h1>
        
        <form th:action="@{/vistas/usuarios/guardar}" th:object="${usuario}" method="post">
            <input type="hidden" th:field="*{codigoUsuario}">
            <input type="hidden" th:field="*{estado}">

            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Nombre de Usuario:</label>
                <input type="text" th:field="*{username}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Correo Electrónico:</label>
                <input type="email" th:field="*{email}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom:5px;">Contraseña:</label>
                    <input type="password" th:field="*{password}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;" required>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom:5px;">Asignar Rol:</label>
                    <select th:field="*{rol}" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;">
                        <option value="ADMIN">ADMIN</option>
                        <option value="VENDEDOR">VENDEDOR</option>
                    </select>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <button type="submit" class="btn-general btn-primario" style="width: 100%;">Finalizar Registro</button>
                <a th:href="@{/vistas/usuarios}" style="display:block; text-align:center; margin-top:15px; color:var(--roman-coffee-600);">Cancelar operación</a>
            </div>
        </form>
    </div>
</body>
</html>
