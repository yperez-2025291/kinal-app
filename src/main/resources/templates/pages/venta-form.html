<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/formularios-ventas.css}">
    <title th:text="${titulo}"></title>
</head>
<body class="fondo-app">
    <div class="form-container-ventas">
        <h1 class="titulo-pagina" th:text="${titulo}"></h1>
        
        <form th:action="@{/vistas/ventas/guardar}" th:object="${venta}" method="post">
            <input type="hidden" th:field="*{estado}">

            <div class="campo-formulario">
                <label>Fecha de Venta:</label>
                <input type="date" th:field="*{fechaVenta}" required>
            </div>

            <div class="campo-formulario">
                <label>DPI del Cliente:</label>
                <input type="text" th:field="*{cliente.DPICliente}" placeholder="Ingrese el DPI" required>
            </div>

            <div class="campo-formulario">
                <label>ID del Usuario (Vendedor):</label>
                <input type="number" th:field="*{usuario.codigoUsuario}" placeholder="ID del vendedor" required>
            </div>

            <div class="campo-formulario">
                <label>Total de la Venta (Q):</label>
                <input type="number" step="0.01" th:field="*{total}" placeholder="0.00" required>
            </div>
            
            <div class="seccion-acciones">
                <button type="submit" class="btn-form btn-guardar">Finalizar Registro</button>
                <a th:href="@{/vistas/ventas}" class="btn-form btn-cancelar">← Cancelar y Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
