<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/colors.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/usuarios.css}">
  <title>Gestión de Usuarios - Kinal App</title>
</head>
<body>
  <main>
    <div class="contenedor-principal">
    
      <div class="panel-lateral">
        <div class="contenedor-acciones-vertical">
          <a th:href="@{/vistas/usuarios/nuevo}" class="boton-lateral">Nuevo Usuario</a>
          <a th:href="@{/vistas/usuarios(activos=${!soloActivos})}" 
              th:text="${soloActivos ? 'Ver Todos' : 'Ver Activos'}" 
              class="boton-lateral"></a>
          <a th:href="@{/vistas/usuarios}" class="boton-lateral btn-limpiar">Listar Todos</a>
          <a th:href="@{/}" class="boton-lateral btn-home">Volver al Inicio</a>
        </div>
      </div>

      <div class="contenedor-tabla">
        <div class="contenedor-cabecera">
          <h2>Gestión de Usuarios</h2>

          <form th:action="@{/vistas/usuarios}" method="get" class="barra-busqueda">
            <input type="number" name="busqueda" placeholder="Buscar por ID...">
            <button type="submit" class="btn-buscar"></button>
          </form>
        </div>

        <table class="tabla-usuarios">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
              </tr>
          </thead>

          <tbody>
            <tr th:each="u : ${usuarios}">
              <td th:text="${u.codigoUsuario}"></td>
              <td th:text="${u.username}"></td>
              <td th:text="${u.email}"></td>
              <td>
                <span class="etiqueta-rol" th:text="${u.rol}"></span>
              </td>
              <td>
                <span th:class="${u.estado == 1 ? 'estado-activo' : 'estado-inactivo'}"
                      th:text="${u.estado == 1 ? 'Activo' : 'Inactivo'}">
                </span>
              </td>
              <td class="celda-acciones">
                <a th:href="@{/vistas/usuarios/editar/{id}(id=${u.codigoUsuario})}">Editar</a>

                <a th:href="@{/vistas/usuarios/eliminar/{id}(id=${u.codigoUsuario})}" onclick="return confirm('¿Estás seguro de que deseas eliminar este usuario?');">
                  Eliminar
                </a>
              </td>
            </tr>
          </tbody>
          </table>
        </div>
    </div>
  </main>
</body>
</html>
