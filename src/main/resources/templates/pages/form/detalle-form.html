<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/form/form-fk.css}">
    <title th:text="${titulo}"></title>
</head>
<body>
    <main>
        <div class="contenedor-principal">
            <div class="tarjeta-formulario">
                <div class="cabecera">
                    <h2 th:text="${titulo}"></h2>
                    <p>Complete los detalles de la venta</p>
                </div>

                <form th:action="@{/vistas/detalles/guardar}" 
                      th:object="${detalle}" 
                      method="post" 
                      class="formulario">

                    <div class="campo">
                        <label>Cantidad:</label>
                        <input type="number" th:field="*{cantidad}" required min="1">
                    </div>

                    <div class="campo">
                        <label>Precio Unitario (Q):</label>
                        <input type="number" step="0.01" th:field="*{precioUnitario}" required placeholder="0.00">
                    </div>

                    <div class="campo">
                        <label>Subtotal (Q):</label>
                        <input type="number" step="0.01" th:field="*{subtotal}" required placeholder="0.00">
                    </div>

                    <div class="campo">
                        <label>Producto:</label>
                        <select th:field="*{producto.codigoProducto}" required>
                            <option value="">Seleccione un producto</option>
                            <option th:each="p : ${productos}" 
                                    th:value="${p.codigoProducto}" 
                                    th:text="${p.nombreProducto} + ' - Q' + ${p.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>Venta Asociada:</label>
                        <select th:field="*{venta.codigoVenta}" required>
                            <option value="">Seleccione una venta</option>
                            <option th:each="v : ${ventas}" 
                                    th:value="${v.codigoVenta}" 
                                    th:text="'Venta #' + ${v.codigoVenta} + ' - Total: Q' + ${v.total} + ' - Cliente: ' + ${v.cliente.nombreCliente}">
                            </option>
                        </select>
                    </div>

                    <div class="botones">
                        <button type="submit" class="btn-guardar">Guardar Detalle</button>
                        <a th:href="@{/vistas/detalles}" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
