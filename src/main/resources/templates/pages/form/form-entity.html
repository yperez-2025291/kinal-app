<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/colors.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/form/form-entity.css}"> <title th:text="${titulo}"></title>
</head>
<body>
  <main>
    <div class="contenedor-principal">
      <div class="tarjeta-formulario">
        
        <div class="cabecera">
          <h2 th:text="${titulo}"></h2>
          <p>Por favor, complete los campos requeridos.</p>
        </div>

        <form th:action="@{${tipo == 'usuario' ? '/vistas/usuarios/guardar' : (tipo == 'cliente' ? '/vistas/clientes/guardar' : '/vistas/productos/guardar')}}" 
              th:object="${entidad}" method="post" class="formulario">

          <input type="hidden" th:field="*{codigoUsuario}" th:if="${tipo == 'usuario'}">
          <div th:if="${tipo == 'usuario'}" class="campos-especificos">
            <div class="campo">
              <label>Username</label>
              <input type="text" th:field="*{username}" required>
            </div>
            <div class="campo">
              <label>Email</label>
              <input type="email" th:field="*{email}" required>
            </div>
            <div class="campo">
              <label>Password</label>
              <input type="password" th:field="*{password}" required>
            </div>
            <div class="fila">
              <div class="campo">
                <label>Rol</label>
                <select th:field="*{rol}">
                  <option value="admin">Administrador</option>
                  <option value="usuario">Usuario</option>
                </select>
              </div>
              <div class="campo">
                <label>Estado</label>
                <select th:field="*{estado}">
                  <option th:value="1">Activo</option>
                  <option th:value="0">Inactivo</option>
                </select>
              </div>
            </div>
          </div>

          <div class="botones">
            <button type="submit" class="btn-guardar">Confirmar Registro</button>
            <a th:href="@{${tipo == 'usuario' ? '/vistas/usuarios' : '/'}}" class="btn-cancelar">Cancelar</a>
          </div>
        </form>

      </div>
    </div>
  </main>
</body>
</html>
