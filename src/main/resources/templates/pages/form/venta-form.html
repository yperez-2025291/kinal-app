<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/colors.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/form/form-fk.css}">
    <title th:text="${titulo}"></title>
</head>
<body>
    <main>
        <div class="contenedor-principal">
            <div class="tarjeta-formulario">
                <div class="cabecera">
                    <h2 th:text="${titulo}"></h2>
                    <p>Complete los datos de la venta</p>
                </div>

                <form th:action="@{/vistas/ventas/guardar}" 
                    th:object="${venta}" 
                    method="post" 
                    class="formulario">

                    <div class="campo">
                        <label>Fecha de Venta:</label>
                        <input type="date" th:field="*{fechaVenta}" required>
                    </div>

                    <div class="campo">
                        <label>Total (Q):</label>
                        <input type="number" step="0.01" th:field="*{total}" required placeholder="0.00">
                    </div>

                    <div class="campo">
                        <label>Cliente:</label>
                        <select th:field="*{cliente.DPICliente}" required>
                            <option value="">Seleccione un cliente</option>
                            <option th:each="c : ${clientes}" 
                                    th:value="${c.DPICliente}" 
                                    th:text="${c.nombreCliente} + ' ' + ${c.apellidoCliente} + ' - ' + ${c.DPICliente}">
                            </option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>Vendedor (Usuario):</label>
                        <select th:field="*{usuario.codigoUsuario}" required>
                            <option value="">Seleccione un vendedor</option>
                            <option th:each="u : ${usuarios}" 
                                    th:value="${u.codigoUsuario}" 
                                    th:text="${u.username} + ' - ' + ${u.email}">
                            </option>
                        </select>
                    </div>

                    <input type="hidden" th:field="*{estado}">

                    <div class="botones">
                        <button type="submit" class="btn-guardar">Guardar Venta</button>
                        <a th:href="@{/vistas/ventas}" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
