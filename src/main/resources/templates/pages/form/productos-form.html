<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/colors.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/form/form-entity.css}">
  <title th:text="${titulo}"></title>
</head>
<body>
  <div class="contenedor-principal">
    <div class="tarjeta-formulario">
      <div class="cabecera">
        <h2 th:text="${titulo}"></h2>
      </div>
      <form th:action="@{/vistas/productos/guardar}" th:object="${producto}" method="post" class="formulario">
        <input type="hidden" th:field="*{codigoProducto}">
        <div class="campo">
          <label>Nombre del Producto</label>
          <input type="text" th:field="*{nombreProducto}" required>
        </div>
        <div class="campo">
          <label>Precio</label>
          <input type="number" step="0.01" th:field="*{precio}" required>
        </div>
        <div class="campo">
          <label>Stock</label>
          <input type="number" th:field="*{stock}" required>
        </div>
        <div class="campo">
          <label>Estado</label>
          <select th:field="*{estado}">
            <option th:value="1">Activo</option>
            <option th:value="0">Inactivo</option>
          </select>
        </div>
        <div class="botones">
          <button type="submit" class="btn-guardar">Confirmar</button>
          <a th:href="@{/vistas/productos}" class="btn-cancelar">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
